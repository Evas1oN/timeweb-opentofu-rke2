---
- name: Install dependencies
  ansible.builtin.package:
    name:
      - curl
      - gnupg2
      - ca-certificates
      - lsb-release
      - debian-archive-keyring
    state: present

- name: Get nginx repository key
  ansible.builtin.get_url:
    url: "{{ nginx_repo_key.url }}"
    dest: "{{ nginx_repo_key.path }}"
    mode: "0744"

- name: Add nginx repo
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ nginx_repo_key.path }}]
      https://nginx.org/packages/debian
      {{ ansible_facts['distribution_release'] }} nginx
    mode: "0744"
    filename: nginx
    state: present

- name: Set nginx repo priority
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/99nginx
    content: |-
      Package: *
      Pin: release o=nginx
      Pin-Priority: 900
    mode: "0744"

- name: Install nginx
  ansible.builtin.package:
    name:
      - nginx=1.30.0-1~{{ ansible_facts['distribution_release'] }}
    state: present
    update_cache: true

- name: Enable nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Create ssl directory
  ansible.builtin.file:
    path: /etc/nginx/ssl
    state: directory
    mode: "0700"

- name: Copy Let's Encrypt fullchain
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    mode: "0700"
    owner: root
    group: root
  loop:
    - content: "{{ ssl_privkey }}"
      dest: /etc/nginx/ssl/privkey.pem
    - content: "{{ ssl_fullchain }}"
      dest: /etc/nginx/ssl/fullchain.pem
...
